[relaychain]
default_command = "polkadot"
default_args = ["-lparachain=debug"]
chain = "rococo-local"

[[relaychain.nodes]]
name = "alice"
validator = true

[[relaychain.nodes]]
name = "bob"
validator = true

[[parachains]]
id = 2000
chain = "local"
cumulus_based = true

  [[parachains.collators]]
  name = "vibly-collator-1"
  command = "./target/release/vibly-chain-node"
  args = ["--collator", "--tmp", "--alice"]

  [[parachains.collators]]
  name = "vibly-collator-2"
  command = "./target/release/vibly-chain-node"
  args = ["--collator", "--tmp", "--bob"]
